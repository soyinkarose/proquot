<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request a Demo — Proquot</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="site-header" data-include="layout.html#header"></div>

  <main class="container">
    <section class="contact">
      <h1>Request a Demo</h1>
      <p>Tell us which modules you want to see and a little about your organisation — we'll prepare a tailored demo.</p>

      <form id="demo-form" class="contact-form" action="#" method="post">
        <label>
          Name
          <input type="text" name="name" required>
        </label>

        <label>
          Email
          <input type="email" name="email" required>
        </label>

        <label>
          Organisation
          <input type="text" name="org">
        </label>

        <label>
          Phone
          <input type="tel" name="phone">
        </label>

        <label>
          Select modules you're interested in (hold Ctrl/Cmd to select multiple)
          <select name="modules" id="modules" multiple size="8">
            <optgroup label="Accounting">
              <option value="acct-core">Accounting — Core Financials</option>
              <option value="acct-payroll">Accounting — Payroll</option>
              <option value="acct-reporting">Accounting — Reporting & Tax</option>
            </optgroup>
            <optgroup label="HR">
              <option value="hr-core">HR — Employee Records</option>
              <option value="hr-payroll">HR — Payroll</option>
              <option value="hr-recruitment">HR — Recruitment</option>
            </optgroup>
            <optgroup label="Sales">
              <option value="sales-pos">Sales — POS (Point of Sale)</option>
              <option value="sales-crm">Sales — CRM & Leads</option>
              <option value="sales-ecom">Sales — eCommerce</option>
            </optgroup>
            <optgroup label="Purchase">
              <option value="purchase-core">Purchase — Purchasing Workflows</option>
              <option value="purchase-approvals">Purchase — Approvals</option>
            </optgroup>
            <optgroup label="Stock & Inventory">
              <option value="stock-core">Stock — Inventory Control</option>
              <option value="stock-warehousing">Stock — Warehousing</option>
              <option value="stock-pos-integration">Stock — POS Integration</option>
            </optgroup>
            <optgroup label="Website / Applications">
              <option value="web-site">Website — Public Sites</option>
              <option value="web-app">Applications — Mobile / Web Apps</option>
              <option value="web-integration">Integrations — APIs & Webhooks</option>
            </optgroup>
          </select>
        </label>

        <label>
          Additional details / subcategories
          <textarea name="details" rows="4" placeholder="Tell us which specific submodules or features you care about (e.g., multi-store, payroll frequency, POS offline mode)..."></textarea>
        </label>

        <button type="submit">Request Demo</button>
      </form>

      <script>
        (function(){
          const form = document.getElementById('demo-form');
          form.addEventListener('submit', function(e){
            e.preventDefault();
            const data = new FormData(form);
            const selected = Array.from(document.getElementById('modules').selectedOptions).map(o=>o.value);
            const payload = {
              name: data.get('name'),
              email: data.get('email'),
              organisation: data.get('org'),
              phone: data.get('phone'),
              modules: selected,
              details: data.get('details')
            };
            console.log('Demo request:', payload);
            alert('Thanks — your demo request has been recorded. We will contact you shortly.');
            form.reset();
          });
        })();
      </script>

    </section>
  </main>

  <div id="site-footer" data-include="layout.html#footer"></div>
  <script src="script.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request a Demo — Proquot</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="site-header" data-include="layout.html#header"></div>

  <main class="container">
    <section class="contact">
      <h1>Request a Demo</h1>
      <p>Tell us which modules you want to see and a little about your organisation — we'll prepare a tailored demo.</p>

      <form id="demo-form" class="contact-form" action="#" method="post">
        <label>
          Name
          <input type="text" name="name" required>
        </label>

        <label>
          Email
          <input type="email" name="email" required>
        </label>

        <label>
          Organisation
          <input type="text" name="org">
        </label>

        <label>
          Phone
          <input type="tel" name="phone">
        </label>

        <div class="form-row">
          <div class="select-label">Categories</div>
          <div class="checkbox-group" id="categories">
            <label class="pill"><input type="checkbox" name="categories[]" value="accounting">Accounting</label>
            <label class="pill"><input type="checkbox" name="categories[]" value="hr">HR</label>
            <label class="pill"><input type="checkbox" name="categories[]" value="sales">Sales</label>
            <label class="pill"><input type="checkbox" name="categories[]" value="purchase">Purchase</label>
            <label class="pill"><input type="checkbox" name="categories[]" value="stock">Stock & Inventory</label>
            <label class="pill"><input type="checkbox" name="categories[]" value="web">Website / Applications</label>
          </div>
          <span class="select-help">Click a category to toggle selection.</span>
        </div>

        <div class="form-row">
          <div class="select-label">Subcategories</div>
          <div class="subcategories" id="subcategories">
            <!-- Accounting -->
            <div class="sub-item" data-cat="accounting"><input type="checkbox" id="acct-core" name="subcategories[]" value="acct-core"><label for="acct-core">Accounting — Core Financials</label></div>
            <div class="sub-item" data-cat="accounting"><input type="checkbox" id="acct-payroll" name="subcategories[]" value="acct-payroll"><label for="acct-payroll">Accounting — Payroll</label></div>
            <div class="sub-item" data-cat="accounting"><input type="checkbox" id="acct-reporting" name="subcategories[]" value="acct-reporting"><label for="acct-reporting">Accounting — Reporting & Tax</label></div>
            <!-- HR -->
            <div class="sub-item" data-cat="hr"><input type="checkbox" id="hr-core" name="subcategories[]" value="hr-core"><label for="hr-core">HR — Employee Records</label></div>
            <div class="sub-item" data-cat="hr"><input type="checkbox" id="hr-payroll" name="subcategories[]" value="hr-payroll"><label for="hr-payroll">HR — Payroll</label></div>
            <div class="sub-item" data-cat="hr"><input type="checkbox" id="hr-recruitment" name="subcategories[]" value="hr-recruitment"><label for="hr-recruitment">HR — Recruitment</label></div>
            <!-- Sales -->
            <div class="sub-item" data-cat="sales"><input type="checkbox" id="sales-pos" name="subcategories[]" value="sales-pos"><label for="sales-pos">Sales — POS (Point of Sale)</label></div>
            <div class="sub-item" data-cat="sales"><input type="checkbox" id="sales-crm" name="subcategories[]" value="sales-crm"><label for="sales-crm">Sales — CRM & Leads</label></div>
            <div class="sub-item" data-cat="sales"><input type="checkbox" id="sales-ecom" name="subcategories[]" value="sales-ecom"><label for="sales-ecom">Sales — eCommerce</label></div>
            <!-- Purchase -->
            <div class="sub-item" data-cat="purchase"><input type="checkbox" id="purchase-core" name="subcategories[]" value="purchase-core"><label for="purchase-core">Purchase — Purchasing Workflows</label></div>
            <div class="sub-item" data-cat="purchase"><input type="checkbox" id="purchase-approvals" name="subcategories[]" value="purchase-approvals"><label for="purchase-approvals">Purchase — Approvals</label></div>
            <!-- Stock & Inventory -->
            <div class="sub-item" data-cat="stock"><input type="checkbox" id="stock-core" name="subcategories[]" value="stock-core"><label for="stock-core">Stock — Inventory Control</label></div>
            <div class="sub-item" data-cat="stock"><input type="checkbox" id="stock-warehousing" name="subcategories[]" value="stock-warehousing"><label for="stock-warehousing">Stock — Warehousing</label></div>
            <div class="sub-item" data-cat="stock"><input type="checkbox" id="stock-pos-integration" name="subcategories[]" value="stock-pos-integration"><label for="stock-pos-integration">Stock — POS Integration</label></div>
            <!-- Website / Applications -->
            <div class="sub-item" data-cat="web"><input type="checkbox" id="web-site" name="subcategories[]" value="web-site"><label for="web-site">Website — Public Sites</label></div>
            <div class="sub-item" data-cat="web"><input type="checkbox" id="web-app" name="subcategories[]" value="web-app"><label for="web-app">Applications — Mobile / Web Apps</label></div>
            <div class="sub-item" data-cat="web"><input type="checkbox" id="web-integration" name="subcategories[]" value="web-integration"><label for="web-integration">Integrations — APIs & Webhooks</label></div>
          </div>
          <span class="select-help">Click categories to filter the list below, then click subcategories to pick specific demos.</span>
        </div>

        <label>
          Additional details / subcategories
          <textarea name="details" rows="4" placeholder="Tell us which specific submodules or features you care about (e.g., multi-store, payroll frequency, POS offline mode)..."></textarea>
        </label>

        <button type="submit">Request Demo</button>
      </form>

      <script>
        (function(){
          const form = document.getElementById('demo-form');
          const categories = document.querySelectorAll('#categories input[type=checkbox]');
          const subitems = document.querySelectorAll('#subcategories .sub-item');

          function getSelectedCats(){
            return Array.from(categories).filter(c=>c.checked).map(c=>c.value);
          }

          function filterSubcategories(){
            const selected = getSelectedCats();
            subitems.forEach(item=>{
              const cat = item.getAttribute('data-cat');
              if(selected.length === 0 || selected.indexOf(cat) !== -1){
                item.classList.remove('hidden');
                item.querySelector('input').disabled = false;
              } else {
                item.classList.add('hidden');
                item.querySelector('input').disabled = true;
                item.querySelector('input').checked = false;
              }
            });
          }

          categories.forEach(chk=>{
            chk.addEventListener('change', function(){
              const label = this.closest('label');
              if(label){
                label.classList.toggle('selected', this.checked);
              }
              filterSubcategories();
            });
            // initialize pill selected state
            const lab = chk.closest('label'); if(lab) lab.classList.toggle('selected', chk.checked);
          });

          // initialize filter
          filterSubcategories();

          form.addEventListener('submit', function(e){
            e.preventDefault();
            const data = new FormData(form);
            const selectedCats = Array.from(categories.selectedOptions).map(o=>o.value);
            const selectedSubs = Array.from(subcategories.selectedOptions).map(o=>o.value);
            const payload = {
              name: data.get('name'),
              email: data.get('email'),
              organisation: data.get('org'),
              phone: data.get('phone'),
              categories: selectedCats,
              subcategories: selectedSubs,
              details: data.get('details')
            };
            console.log('Demo request:', payload);
            alert('Thanks — your demo request has been recorded. We will contact you shortly.');
            form.reset();
            // reset filter to show all options again
            filterSubcategories();
          });
        })();
      </script>

    </section>
  </main>

  <div id="site-footer" data-include="layout.html#footer"></div>
  <script src="script.js"></script>
</body>
</html>
